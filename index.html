<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉大民雄校區地圖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #6cb125; 
            overflow: hidden; 
            font-family: sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #map-container {
            position: absolute;
            transform-origin: 0 0; 
        }

        #map-image {
            display: block;
            cursor: grab; 
        }
        #map-image:active {
            cursor: grabbing; 
        }

        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 60px;  
            height: 60px; 
            background-color: white;
            border: 8px solid var(--theme-color, #00e5ff); 
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            z-index: 10;
            
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333; 
            font-size: 32px; 
            font-weight: 900; 
        }

        .hotspot::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-color: var(--theme-color, #00e5ff);
            border-radius: 50%;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .hotspot::before {
            content: attr(data-name);
            position: absolute;
            bottom: 105px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(40, 40, 40, 0.95); 
            color: #ffffff; 
            padding: 16px 32px; 
            border-radius: 16px; 
            font-size: 56px; 
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.2s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .hotspot:hover::before {
            opacity: 1;
        }

        #coord-helper { display: none; }

        /* ==========================================
           🌟 新增：圖例面板的專屬設計
           ========================================== */
        #legend-panel {
            position: fixed; /* 固定在畫面上，不會跟著地圖拖曳 */
            top: 20px;
            right: 20px; /* 放在右上角空白處 */
            background-color: rgba(40, 40, 40, 0.85); /* 半透明深色背景 */
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100; /* 確保它浮在最上層 */
            max-height: 80vh; /* 避免名單太長超過螢幕 */
            overflow-y: auto; /* 名單太長時可以滑動 */
        }

        #legend-panel h3 {
            margin: 0 0 15px 0;
            font-size: 24px;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        #legend-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #legend-panel li {
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        /* 圖例裡面的小圈圈數字 */
        #legend-panel .leg-num {
            display: inline-block;
            background-color: #00e5ff;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 12px;
            font-size: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="coord-helper"></div>

    <div id="legend-panel">
        <h3>📍 校園圖例</h3>
        <ul id="legend-list">
            </ul>
    </div>

    <div id="viewport">
        <div id="map-container">
            <img id="map-image" src="Minxiong_map.png" alt="校區地圖" draggable="false">
        </div>
    </div>

    <script>
        const locations = [
            { num: "1",  id: 15, name: "大門口", x: 25.4, y: 62.5, color: "#00e5ff", link: "./routeB/index.html?p=5" },
            { num: "2",  id: 10, name: "科學館", x: 25.8, y: 49.0, color: "#00e5ff", link: "./routeA/index.html?p=12" },
            { num: "3",  id: 4,  name: "民雄一宿", x: 41.3, y: 65.0, color: "#00e5ff", link: "./routeC/index.html?p=0" },
            { num: "4",  id: 11, name: "人文館", x: 19.5, y: 44.9, color: "#00e5ff", link: "./routeA/index.html?p=10" },
            { num: "5",  id: 5,  name: "學員餐廳", x: 44.5, y: 67.2, color: "#00e5ff", link: "./routeC/index.html?p=1" },
            { num: "6",  id: 6,  name: "行政大樓", x: 44.3, y: 52.6, color: "#00e5ff", link: "./routeB/index.html?p=2" },
            { num: "7",  id: 12, name: "大學館（禮堂）", x: 32.2, y: 39.7, color: "#00e5ff", link: "./routeA/index.html?p=8" },
            { num: "8",  id: 3,  name: "民雄二宿", x: 48.4, y: 68.9, color: "#00e5ff", link: "./routeC/index.html?p=2" },
            { num: "9",  id: 1,  name: "初教館", x: 48.9, y: 49.6, color: "#00e5ff", link: "./routeB/index.html?p=12" },
            { num: "10", id: 8,  name: "體育館（樂育堂）", x: 54.0, y: 66.8, color: "#00e5ff", link: "./routeC/index.html?p=2" },
            { num: "11", id: 2,  name: "圖書館", x: 53.7, y: 46.4, color: "#00e5ff", link: "./routeB/index.html?p=15" },
            { num: "12", id: 14, name: "文薈廳", x: 25.6, y: 26.9, color: "#00e5ff", link: "./routeA/index.html?p=6" },
            { num: "13", id: 13, name: "創意樓", x: 45.4, y: 32.2, color: "#00e5ff", link: "./routeA/index.html?p=4" },
            { num: "14", id: 7,  name: "教育館", x: 58.1, y: 42.7, color: "#00e5ff", link: "./routeB/index.html?p=18" },
            { num: "15", id: 9,  name: "新藝樓", x: 34.8, y: 20.5, color: "#00e5ff", link: "./routeA/index.html?p=0" },
        ];

        const container = document.getElementById('map-container');
        const mapImage = document.getElementById('map-image');
        const viewport = document.getElementById('viewport');
        const legendList = document.getElementById('legend-list'); // 抓取圖例清單的容器

        locations.forEach(loc => {
            // 1. 產生圖例項目
            if(loc.num) {
                const li = document.createElement('li');
                // 產生像 [1] 大門口 這樣的格式
                li.innerHTML = `<span class="leg-num" style="background-color: ${loc.color};">${loc.num}</span> ${loc.name}`;
                legendList.appendChild(li);
            }

            // 2. 產生點點
            const dot = document.createElement('div');
            dot.className = 'hotspot';
            dot.style.left = loc.x + '%';
            dot.style.top = loc.y + '%';
            dot.style.setProperty('--theme-color', loc.color);
            dot.setAttribute('data-name', loc.name);
            
            if(loc.num) {
                dot.textContent = loc.num;
            }

            dot.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (loc.link) window.open(loc.link, '_blank');
            });
            container.appendChild(dot);
        });

        // ==========================================
        // 攝影機縮放與拖曳功能
        // ==========================================
        let currentScale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function initMapView() {
            const ratioX = window.innerWidth / mapImage.naturalWidth;
            const ratioY = window.innerHeight / mapImage.naturalHeight;
            
            currentScale = Math.min(ratioX, ratioY) * 1.15; 
            
            translateX = (window.innerWidth - (mapImage.naturalWidth * currentScale)) / 2;
            translateY = (window.innerHeight - (mapImage.naturalHeight * currentScale)) / 2;
            updateTransform();
        }

        mapImage.onload = initMapView;
        if(mapImage.complete) initMapView();

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomIntensity = 0.1; 
            const delta = e.deltaY > 0 ? -zoomIntensity : zoomIntensity;
            
            const mouseX = e.clientX - translateX;
            const mouseY = e.clientY - translateY;
            
            const newScale = Math.min(Math.max(0.2, currentScale + delta), 4);
            
            translateX -= mouseX * (newScale / currentScale - 1);
            translateY -= mouseY * (newScale / currentScale - 1);
            
            currentScale = newScale;
            updateTransform();
        }, { passive: false });

        viewport.addEventListener('mousedown', (e) => {
            // 如果點到熱點或是圖例面板，就不要觸發拖曳
            if (e.target.closest('.hotspot') || e.target.closest('#legend-panel')) return; 
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mouseleave', () => { isDragging = false; });

    </script>
</body>
</html>
